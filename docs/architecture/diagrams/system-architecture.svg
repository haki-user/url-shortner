<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">TinyURL current and target architecture</title>
  <desc id="desc">Two panels compare the current single Go service with the target independently scalable redirect, management, cache, and event workloads.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 32px Inter, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Inter, "Segoe UI", sans-serif; fill: #475569; }
      .panel-title { font: 700 20px Inter, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-title { font: 700 16px Inter, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-copy { font: 400 13px Inter, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 600 12px Inter, "Segoe UI", sans-serif; fill: #475569; }
      .badge { font: 700 11px Inter, "Segoe UI", sans-serif; letter-spacing: 0.8px; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .current { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; filter: url(#shadow); }
      .next { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; filter: url(#shadow); }
      .future { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 7 5; }
      .line-blue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow-blue); }
      .line-purple { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrow-purple); }
      .line-gray { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect width="1400" height="860" fill="#ffffff"/>
  <text x="44" y="52" class="title">TinyURL architecture</text>
  <text x="44" y="78" class="subtitle">What exists today, and the smallest useful path to independent scale</text>

  <rect x="44" y="102" width="1312" height="246" rx="18" class="panel"/>
  <text x="72" y="138" class="panel-title">Today: one production-shaped Go service</text>
  <rect x="1140" y="118" width="178" height="28" rx="14" fill="#dbeafe"/>
  <text x="1229" y="137" text-anchor="middle" class="badge" fill="#1d4ed8">IMPLEMENTED</text>

  <rect x="78" y="176" width="180" height="62" rx="12" class="card"/>
  <text x="168" y="202" text-anchor="middle" class="node-title">Owner client</text>
  <text x="168" y="222" text-anchor="middle" class="node-copy">Create and manage</text>

  <rect x="78" y="258" width="180" height="62" rx="12" class="card"/>
  <text x="168" y="284" text-anchor="middle" class="node-title">Visitor</text>
  <text x="168" y="304" text-anchor="middle" class="node-copy">Resolve short code</text>

  <path d="M258 207 H352" class="line-blue"/>
  <path d="M258 289 H322 Q352 289 352 259" class="line-blue"/>

  <rect x="354" y="166" width="352" height="150" rx="16" class="current"/>
  <text x="530" y="198" text-anchor="middle" class="node-title">linkd</text>
  <text x="530" y="221" text-anchor="middle" class="node-copy">HTTP + application + domain + adapters</text>
  <rect x="382" y="242" width="92" height="40" rx="9" fill="#ffffff" stroke="#93c5fd"/>
  <text x="428" y="267" text-anchor="middle" class="small">Create</text>
  <rect x="484" y="242" width="92" height="40" rx="9" fill="#ffffff" stroke="#93c5fd"/>
  <text x="530" y="267" text-anchor="middle" class="small">Manage</text>
  <rect x="586" y="242" width="92" height="40" rx="9" fill="#ffffff" stroke="#93c5fd"/>
  <text x="632" y="267" text-anchor="middle" class="small">Redirect</text>

  <path d="M706 241 H808" class="line-blue"/>
  <rect x="810" y="174" width="286" height="134" rx="16" class="current"/>
  <text x="953" y="205" text-anchor="middle" class="node-title">Postgres or memory</text>
  <text x="953" y="229" text-anchor="middle" class="node-copy">Links + idempotency + redirect events</text>
  <text x="953" y="260" text-anchor="middle" class="small">Strong writes and direct redirect reads</text>
  <text x="953" y="282" text-anchor="middle" class="small">Inline best-effort analytics recording</text>

  <rect x="1142" y="184" width="170" height="114" rx="14" class="card"/>
  <text x="1227" y="213" text-anchor="middle" class="node-title">Operational</text>
  <text x="1227" y="237" text-anchor="middle" class="node-copy">Health probes</text>
  <text x="1227" y="258" text-anchor="middle" class="node-copy">Graceful shutdown</text>
  <text x="1227" y="279" text-anchor="middle" class="node-copy">Optimistic writes</text>

  <rect x="44" y="378" width="1312" height="416" rx="18" class="panel"/>
  <text x="72" y="414" class="panel-title">Target: split only where workload or failure isolation requires it</text>

  <rect x="72" y="451" width="148" height="56" rx="11" class="card"/>
  <text x="146" y="476" text-anchor="middle" class="node-title">Owner</text>
  <text x="146" y="495" text-anchor="middle" class="node-copy">Authenticated</text>
  <rect x="72" y="570" width="148" height="56" rx="11" class="card"/>
  <text x="146" y="595" text-anchor="middle" class="node-title">Visitor</text>
  <text x="146" y="614" text-anchor="middle" class="node-copy">Redirect traffic</text>

  <path d="M220 479 H280" class="line-gray"/>
  <path d="M220 598 H280" class="line-gray"/>

  <rect x="282" y="451" width="156" height="56" rx="11" class="future"/>
  <text x="360" y="476" text-anchor="middle" class="node-title">API gateway</text>
  <text x="360" y="495" text-anchor="middle" class="node-copy">Auth + routing</text>
  <rect x="282" y="570" width="156" height="56" rx="11" class="future"/>
  <text x="360" y="595" text-anchor="middle" class="node-title">CDN / edge</text>
  <text x="360" y="614" text-anchor="middle" class="node-copy">Popular redirects</text>

  <path d="M438 479 H500" class="line-gray"/>
  <path d="M438 598 H500" class="line-gray"/>

  <rect x="502" y="439" width="190" height="80" rx="14" class="future"/>
  <text x="597" y="470" text-anchor="middle" class="node-title">linkd</text>
  <text x="597" y="493" text-anchor="middle" class="node-copy">Strong management writes</text>
  <rect x="502" y="558" width="190" height="80" rx="14" class="next"/>
  <text x="597" y="589" text-anchor="middle" class="node-title">redirectd</text>
  <text x="597" y="612" text-anchor="middle" class="node-copy">Low-latency read path</text>

  <path d="M692 479 H754" class="line-gray"/>
  <path d="M692 598 H754" class="line-purple"/>

  <rect x="756" y="439" width="180" height="80" rx="14" class="future"/>
  <text x="846" y="470" text-anchor="middle" class="node-title">Primary store</text>
  <text x="846" y="493" text-anchor="middle" class="node-copy">Strong source of truth</text>
  <rect x="756" y="558" width="180" height="80" rx="14" class="next"/>
  <text x="846" y="589" text-anchor="middle" class="node-title">Regional Redis</text>
  <text x="846" y="612" text-anchor="middle" class="node-copy">Versioned mappings</text>

  <path d="M936 598 H998" class="line-purple"/>
  <rect x="1000" y="558" width="186" height="80" rx="14" class="future"/>
  <text x="1093" y="589" text-anchor="middle" class="node-title">URL read store</text>
  <text x="1093" y="612" text-anchor="middle" class="node-copy">Replicated by code</text>

  <path d="M936 479 H970 V664 H846 V682" class="line-gray"/>
  <path d="M597 638 V719 H742" class="line-gray"/>
  <rect x="744" y="684" width="204" height="70" rx="14" class="future"/>
  <text x="846" y="712" text-anchor="middle" class="node-title">Durable event stream</text>
  <text x="846" y="735" text-anchor="middle" class="node-copy">Versioned changes + clicks</text>

  <path d="M948 719 H1000" class="line-gray"/>
  <rect x="1002" y="676" width="310" height="86" rx="14" class="future"/>
  <text x="1157" y="704" text-anchor="middle" class="node-title">Independent consumers</text>
  <text x="1157" y="728" text-anchor="middle" class="node-copy">Invalidation | analytics | security</text>
  <text x="1157" y="748" text-anchor="middle" class="node-copy">Scale and fail independently</text>

  <rect x="72" y="812" width="16" height="16" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="98" y="825" class="small">Implemented</text>
  <rect x="200" y="812" width="16" height="16" rx="4" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="226" y="825" class="small">Next milestone</text>
  <rect x="366" y="812" width="16" height="16" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="4 3"/>
  <text x="392" y="825" class="small">Planned when justified</text>
</svg>
