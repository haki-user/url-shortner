name: Deploy Azure VM

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    env:
      REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      VM_NAME: ${{ vars.AZURE_VM_NAME }}
      KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT }}
      TINYURL_PUBLIC_URL: ${{ vars.TINYURL_PUBLIC_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$REGISTRY_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/tinyurl-linkd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install runtime files on VM
        shell: bash
        run: |
          set -euo pipefail

          compose_b64="$(base64 -w 0 deploy/azure-vm/compose.yaml)"
          caddy_b64="$(base64 -w 0 deploy/azure-vm/Caddyfile)"
          deploy_b64="$(base64 -w 0 deploy/azure-vm/deploy.sh)"

          cat > /tmp/install-runtime.sh <<EOF
          set -eu
          install -d -m 0750 -o azureuser -g azureuser /opt/tinyurl
          printf '%s' '$compose_b64' | base64 -d > /opt/tinyurl/compose.yaml
          printf '%s' '$caddy_b64' | base64 -d > /opt/tinyurl/Caddyfile
          printf '%s' '$deploy_b64' | base64 -d > /opt/tinyurl/deploy.sh
          chown azureuser:azureuser /opt/tinyurl/compose.yaml /opt/tinyurl/Caddyfile /opt/tinyurl/deploy.sh
          chmod 0640 /opt/tinyurl/compose.yaml /opt/tinyurl/Caddyfile
          chmod 0750 /opt/tinyurl/deploy.sh
          EOF

          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts @/tmp/install-runtime.sh \
            --output none

      - name: Run migrations and deploy
        shell: bash
        run: |
          set -euo pipefail

          image="$REGISTRY_NAME.azurecr.io/tinyurl-linkd:${GITHUB_SHA}"

          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "sudo -u azureuser /opt/tinyurl/deploy.sh '$image' '$TINYURL_PUBLIC_URL' '$REGISTRY_NAME' '$KEY_VAULT_NAME'" \
            --output none

      - name: Verify public health
        run: curl --fail --show-error --silent --retry 12 --retry-delay 5 "$TINYURL_PUBLIC_URL/readyz"
