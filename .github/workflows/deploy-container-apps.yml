name: Deploy Azure Container Apps

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, Migrate And Deploy
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    env:
      REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP }}
      CONTAINER_APP_ENVIRONMENT: ${{ vars.AZURE_CONTAINER_APP_ENVIRONMENT }}
      MIGRATION_JOB_NAME: ${{ vars.AZURE_MIGRATION_JOB }}
      CUSTOM_DOMAIN: ${{ vars.TINYURL_CUSTOM_DOMAIN }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps CLI support
        run: az extension add --name containerapp --upgrade --yes

      - name: Log in to Azure Container Registry
        run: az acr login --name "$REGISTRY_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/tinyurl-linkd:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail

          image="$REGISTRY_NAME.azurecr.io/tinyurl-linkd:$IMAGE_TAG"

          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME" \
            --image "$image" \
            --output none

          execution="$(
            az containerapp job start \
              --resource-group "$RESOURCE_GROUP" \
              --name "$MIGRATION_JOB_NAME" \
              --query name \
              --output tsv
          )"

          for attempt in $(seq 1 90); do
            status="$(
              az containerapp job execution show \
                --resource-group "$RESOURCE_GROUP" \
                --name "$MIGRATION_JOB_NAME" \
                --job-execution-name "$execution" \
                --query properties.status \
                --output tsv
            )"

            case "$status" in
              Succeeded)
                break
                ;;
              Failed)
                echo "migration execution failed: $execution" >&2
                exit 1
                ;;
            esac

            if [ "$attempt" -eq 90 ]; then
              echo "migration execution timed out: $execution" >&2
              exit 1
            fi

            sleep 5
          done

      - name: Deploy application revision
        run: |
          image="$REGISTRY_NAME.azurecr.io/tinyurl-linkd:$IMAGE_TAG"

          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --image "$image" \
            --output none

      - name: Bind custom hostname
        if: env.CUSTOM_DOMAIN != ''
        shell: bash
        run: |
          set -euo pipefail

          certificate_id="$(
            az containerapp env certificate list \
              --resource-group "$RESOURCE_GROUP" \
              --name "$CONTAINER_APP_ENVIRONMENT" \
              --query "[?properties.subjectName=='$CUSTOM_DOMAIN'].id | [0]" \
              --output tsv
          )"

          if [ -z "$certificate_id" ]; then
            echo "managed certificate for $CUSTOM_DOMAIN was not found" >&2
            exit 1
          fi

          az containerapp hostname add \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --hostname "$CUSTOM_DOMAIN" \
            --output none || true

          az containerapp hostname bind \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --hostname "$CUSTOM_DOMAIN" \
            --certificate "$certificate_id" \
            --output none

      - name: Verify public health
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            fqdn="$CUSTOM_DOMAIN"
          else
            fqdn="$(
              az containerapp show \
                --resource-group "$RESOURCE_GROUP" \
                --name "$CONTAINER_APP_NAME" \
                --query properties.configuration.ingress.fqdn \
                --output tsv
            )"
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 18 \
            --retry-all-errors \
            --retry-delay 5 \
            "https://$fqdn/readyz"
